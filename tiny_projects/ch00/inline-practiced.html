<!doctype html>
<html lang="en">
    <head>
        <!-- Required meta tags always come first -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>CSS Projects</title>

        <!-- CSS -->
        <!--using embedded styles -->
        <style>
            h2,
            h3,
            h4,
            h5,
            h6 {
                color: red;
            }
        </style>
        <link href="main.css" text="text/css" rel="stylesheet" />
    </head>
    <body>
        <!--using inline styles -->
        <h1 style="color: crimson">Title of our article (heading 1)</h1>
        <h2>Title of our article (heading 2)</h2>
        <h3>Title of our article (heading 3)</h3>
        <h4>Title of our article (heading 4)</h4>
        <h5>Title of our article (heading 5)</h5>
        <h6>Title of our article (heading 6)</h6>
        <!-- JS. -->
        <script src=""></script>
    </body>
</html>
